<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="studio.css">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div class="dot-grid-fixed"></div>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-logo">Launchpad Studio</span>
  <div class="topbar-right" id="topbar-right">
    <a href="index.html" style="font-size:13px;color:rgba(26,42,74,0.5);text-decoration:none;letter-spacing:0.5px;font-weight:500;" onmouseover="this.style.color='#1a2a4a'" onmouseout="this.style.color='rgba(26,42,74,0.5)'">← Home</a>
  </div>
</div>

<!-- Setup screen -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>Create a Launchpad</h1>
    <p>Name your launchpad and choose a grid size to get started.</p>

    <div class="setup-label">Launchpad name</div>
    <input type="text" class="setup-name-input" id="setup-name" placeholder="My Launchpad" maxlength="40">

    <div class="setup-label">Grid size</div>
    <div class="grid-size-picker">
      <button class="grid-size-btn" data-size="3">3×3<span>9 slots</span></button>
      <button class="grid-size-btn" data-size="4">4×4<span>16 slots</span></button>
      <button class="grid-size-btn selected" data-size="5">5×5<span>25 slots</span></button>
    </div>

    <button class="btn btn-primary" id="start-btn" style="width:100%;padding:14px;font-size:15px;">Start Building →</button>
  </div>
</div>

<!-- Builder screen -->
<div id="builder-screen" style="display:none;">

  <!-- Grid panel -->
  <div class="grid-panel" id="grid-panel">
    <div class="studio-grid" id="studio-grid"></div>
    <div class="assign-hint" id="assign-hint">Click a sound from the pool, then click a slot to assign it</div>
    <div class="grid-actions">
      <button class="btn btn-ghost" id="bg-upload-btn">🖼 Background</button>
      <input type="file" id="bg-file-input" accept="image/jpeg,image/png,image/webp" style="display:none;">
      <button class="btn btn-danger" id="reset-btn">↺ Reset</button>
      <button class="btn btn-success" id="save-btn">Save &amp; Share</button>
    </div>
    <div id="bg-preview-strip" style="display:none; align-items:center; gap:10px; font-size:12px; color:rgba(255,255,255,0.45);">
      <img id="bg-preview-thumb" style="width:48px; height:32px; object-fit:cover; border-radius:6px; border:1px solid rgba(255,255,255,0.15);">
      <span id="bg-preview-name"></span>
      <button id="bg-remove-btn" style="background:none; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-size:14px; padding:0 4px;" title="Remove">✕</button>
    </div>
  </div>

  <!-- Sound pool panel -->
  <div class="pool-panel">
    <div class="pool-header">
      <h3>Sound Pool</h3>
      <input type="text" class="pool-search" id="pool-search" placeholder="Search sounds…">
      <div class="cat-tabs" id="cat-tabs"></div>
    </div>
    <div class="pool-list" id="pool-list"></div>
  </div>

</div>

<!-- Share modal -->
<div class="modal-overlay hidden" id="share-modal">
  <div class="modal">
    <h2>Your launchpad is live! 🎛️</h2>
    <p>Share this link — anyone can open and play your launchpad.</p>
    <div class="share-link-box">
      <input type="text" class="share-link-input" id="share-link" readonly>
      <button class="btn btn-primary" id="copy-btn">Copy</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="play-btn">▶ Play it now</button>
      <button class="btn btn-ghost" id="close-modal-btn">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="studio.js"></script>
</body>
</html>
