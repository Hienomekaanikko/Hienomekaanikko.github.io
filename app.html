<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader" style="position:fixed;inset:0;background:#050300;z-index:9999;transition:opacity 0.3s ease;pointer-events:none;"></div>

  <a href="index.html" class="home-btn">← Home</a>

  <!-- Auth + subscribe buttons -->
  <div id="auth-btn-wrap">
    <button id="subscribe-btn" class="auth-btn subscribe-btn hidden">Get Sound Packs</button>
    <button id="edit-btn" class="auth-btn hidden">Edit Pack</button>
    <button id="auth-btn" class="auth-btn">Log in</button>
    <button id="logout-btn" class="auth-btn logout-btn hidden">Log out</button>
  </div>

  <input type="file" id="slot-file-input" accept=".wav,.mp3,.ogg" style="display:none">
  <input type="file" id="bg-file-input" accept="image/jpeg,image/png,image/webp" style="display:none">
  <button id="change-bg-btn" class="auth-btn hidden">Change BG</button>

  <!-- Auth modal -->
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="auth-modal">
      <button id="auth-close" class="auth-close">✕</button>
      <button id="google-signin" class="auth-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div class="auth-divider">or</div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log in</button>
        <button class="auth-tab" data-tab="signup">Sign up</button>
      </div>
      <div id="auth-login" class="auth-pane">
        <input type="email" id="login-email" placeholder="Email" class="auth-input">
        <input type="password" id="login-password" placeholder="Password" class="auth-input">
        <button id="login-submit" class="auth-submit">Log in</button>
      </div>
      <div id="auth-signup" class="auth-pane hidden">
        <input type="email" id="signup-email" placeholder="Email" class="auth-input">
        <input type="password" id="signup-password" placeholder="Password (min 6 chars)" class="auth-input">
        <button id="signup-submit" class="auth-submit">Create account</button>
      </div>
      <div id="auth-status" class="auth-status hidden"></div>
    </div>
  </div>

  <nav class="theme-nav left">
    <button class="nav-btn" id="prev-btn">&#8592;</button>
    <span class="theme-label" id="theme-label-left"></span>
  </nav>

  <nav class="theme-nav right">
    <button class="nav-btn" id="next-btn">&#8594;</button>
    <span class="theme-label" id="theme-label-right"></span>
  </nav>

  <canvas id="particle-canvas"></canvas>
  <div class="dot-grid"></div>

  <div id="animals-bg">
    <span class="animal a1">🦁</span>
    <span class="animal a2">🐼</span>
    <span class="animal a3">🦊</span>
    <span class="animal a4">🐸</span>
    <span class="animal a5">🦋</span>
    <span class="animal a6">🐮</span>
    <span class="animal a7">🐷</span>
    <span class="animal a8">🦒</span>
    <span class="animal a9">🐘</span>
    <span class="animal a10">🦄</span>
    <span class="animal a11">🐬</span>
    <span class="animal a12">🦆</span>
    <span class="animal a13">🐙</span>
    <span class="animal a14">🐢</span>
  </div>

  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>
  </div>

  <div class="grid-wrapper">
    <div id="master-bar"><div id="master-bar-fill"></div></div>
    <div id="transport-controls">
      <button id="split-btn" class="transport-btn">SPLIT ½</button>
    </div>

    <div class="grid-with-knobs">
      <div class="knob-col-wrap">
        <span class="knob-col-label">VOL</span>
        <div class="knob-col" id="vol-knobs"></div>
      </div>

      <div class="container">
        <!-- Row 1 -->
        <div class="btn" id="btn1"><a></a></div>
        <div class="btn" id="btn2"><a></a></div>
        <div class="btn" id="btn3"><a></a></div>
        <div class="btn" id="btn4"><a></a></div>
        <div class="btn" id="btn5"><a></a></div>

        <!-- Row 2 -->
        <div class="btn" id="btn6"><a></a></div>
        <div class="btn" id="btn7"><a></a></div>
        <div class="btn" id="btn8"><a></a></div>
        <div class="btn" id="btn9"><a></a></div>
        <div class="btn" id="btn10"><a></a></div>

        <!-- Row 3 -->
        <div class="btn" id="btn11"><a></a></div>
        <div class="btn" id="btn12"><a></a></div>
        <div class="btn" id="btn13"><a></a></div>
        <div class="btn" id="btn14"><a></a></div>
        <div class="btn" id="btn15"><a></a></div>

        <!-- Row 4 -->
        <div class="btn" id="btn16"><a></a></div>
        <div class="btn" id="btn17"><a></a></div>
        <div class="btn" id="btn18"><a></a></div>
        <div class="btn" id="btn19"><a></a></div>
        <div class="btn" id="btn20"><a></a></div>

        <!-- Row 5 -->
        <div class="btn" id="btn21"><a></a></div>
        <div class="btn" id="btn22"><a></a></div>
        <div class="btn" id="btn23"><a></a></div>
        <div class="btn" id="btn24"><a></a></div>
        <div class="btn" id="btn25"><a></a></div>
      </div>

      <div class="knob-col-wrap">
        <span class="knob-col-label">LP</span>
        <div class="knob-col" id="filter-knobs"></div>
      </div>

      <div class="knob-col-wrap">
        <span class="knob-col-label">STU</span>
        <div class="knob-col" id="stutter-btns"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
